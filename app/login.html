<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
  margin:0;
  font-family: Inter, system-ui, Arial;
  background:#f1f5f9;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-card{
  background:white;
  padding:2rem;
  border-radius:18px;
  width:340px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.login-card h2{
  margin-top:0;
  color:#1e293b;
}

.input{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  font-size:14px;
}

.input:focus{
  outline:none;
  border-color:#3b82f6;
}

.btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:600;
  cursor:pointer;
  margin-top:6px;
}

.btn-primary{
  background:#3b82f6;
  color:white;
}

.btn-primary:hover{
  background:#2563eb;
}

.btn-secondary{
  background:#e2e8f0;
  color:#1e293b;
}

.btn-google{
  background:white;
  border:1px solid #cbd5e1;
}

.btn-google:hover{
  background:#f8fafc;
}

.divider{
  text-align:center;
  margin:18px 0;
  color:#94a3b8;
  font-size:13px;
}

#msg{
  margin-top:10px;
  font-size:13px;
  color:#ef4444;
}

</style>
</head>

<body>

<div class="login-card">

<h2>Sign in</h2>

<input id="email" class="input" type="email" placeholder="Email">
<input id="password" class="input" type="password" placeholder="Password">

<button id="loginBtn" class="btn btn-primary">Login</button>
<button id="signupBtn" class="btn btn-secondary">Create account</button>

<div class="divider">or</div>

<button id="googleBtn" class="btn btn-google">
Login with Google
</button>

<p id="msg"></p>

</div>

<script type="module">

import { login, signup, loginGoogle } from "./js/auth.js";

const msg = document.getElementById("msg");
const email = document.getElementById("email");
const password = document.getElementById("password");

loginBtn.onclick = async () => {
  try{
    await login(email.value,password.value);
    window.location.href="/dashboard.html";
  }catch(e){
    msg.textContent=e.message;
  }
}

signupBtn.onclick = async () => {
  try{
    await signup(email.value,password.value);
    window.location.href="/dashboard.html";
  }catch(e){
    msg.textContent=e.message;
  }
}

googleBtn.onclick = async () => {
  try{
    await loginGoogle();
    window.location.href="/dashboard.html";
  }catch(e){
    msg.textContent=e.message;
  }
}

</script>

</body>
</html>
