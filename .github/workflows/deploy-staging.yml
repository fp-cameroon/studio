name: Deploy to Firebase Hosting Staging
on:
  push:
    branches:
      - main
    paths:
      - app/**
      - .github/workflows/deploy.yml

env:
  ENVIRONMENT: staging
  PROJECT: staging-fp-cameroon

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "cooking_firebase_config"
        run: make cook
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING_FP_CAMEROON }}
          channelId: live
          projectId: $PROJECT
